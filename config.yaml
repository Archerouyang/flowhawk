# Options Anomaly Screener Configuration

# Data sources
data_sources:
  theta_data:
    enabled: true
    # Credentials loaded from THETA_DATA_USER / THETA_DATA_PASS env vars
    base_url: "https://api.thetadata.net"
    cache_dir: "./data/cache/theta"

  yfinance:
    enabled: true
    cache_dir: "./data/cache/yahoo"
    period: "6mo"
    interval: "1d"

# Paths
data:
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  cache_dir: "./data/cache"
  db_path: "./data/processed/screener.db"

# Screening parameters
screening:
  # Stage 1: Options anomaly filters
  options:
    min_voi_ratio: 3.0
    min_volume_spike: 5.0
    min_premium_usd: 100000
    max_iv_rank: 50.0
    min_dte: 180
    max_dte: 730
    min_delta: 0.50
    max_delta: 0.85
    min_contract_volume: 500
    top_n_anomalies: 50

  # Stage 2: Stock technical filters
  technical:
    min_price_vs_sma200: 1.0
    min_price_vs_sma20: 1.0
    min_volume_vs_avg: 1.5
    rsi_min: 30
    rsi_max: 70
    max_atr_ratio: 0.05

  # Stage 3: LEAPS selection
  leaps:
    min_dte: 180
    target_delta_min: 0.65
    target_delta_max: 0.80
    max_theta_ratio: 0.003
    max_bid_ask_spread: 0.05
    max_iv_percentile: 50
    top_n_recommendations: 2

# Dashboard
dashboard:
  port: 8501
  theme: "dark"
  page_title: "Options Anomaly Screener"

# Scheduler
scheduler:
  scan_time: "16:35"
  timezone: "US/Eastern"
